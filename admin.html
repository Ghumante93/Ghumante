```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GHUMANTE Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.stat-card h3{
color:#666;
margin-bottom:10px;
}

.stat-card p{
font-size:28px;
font-weight:bold;
color:#0f766e;
}

.nav{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.nav button{
padding:12px 20px;
border:none;
background:#0f766e;
color:white;
cursor:pointer;
border-radius:6px;
}

.nav button:hover{
background:#115e59;
}

.section{
display:none;
}

.section.active{
display:block;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h2{
margin-bottom:15px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
}

button.save{
width:100%;
padding:12px;
background:#0f766e;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button.save:hover{
background:#115e59;
}

.listing{
border:1px solid #ddd;
padding:15px;
margin-bottom:12px;
border-radius:8px;
}

.delete-btn{
background:#dc2626;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.delete-btn:hover{
background:#b91c1c;
}

.category-title{
margin-top:25px;
margin-bottom:10px;
color:#0f172a;
}

@media(max-width:768px){

.nav{
flex-direction:column;
}

}

</style>
</head>

<body>

<header>
<h1>GHUMANTE Admin Dashboard</h1>
<p>Travel • Stay • Explore</p>
</header>

<div class="container">

<div class="stats">

<div class="stat-card">
<h3>Hotels</h3>
<p id="hotelCount">0</p>
</div>

<div class="stat-card">
<h3>Homestays</h3>
<p id="homestayCount">0</p>
</div>

<div class="stat-card">
<h3>Packages</h3>
<p id="packageCount">0</p>
</div>

<div class="stat-card">
<h3>Total Listings</h3>
<p id="totalCount">0</p>
</div>

</div>

<div class="nav">
<button onclick="showSection('hotels')">Hotels</button>
<button onclick="showSection('homestays')">Homestays</button>
<button onclick="showSection('packages')">Packages</button>
<button onclick="showSection('manager')">Listings Manager</button>
</div>

<!-- HOTELS -->

<div id="hotels" class="section active">

<div class="card">

<h2>Add Hotel</h2>

<input id="hotelName" placeholder="Hotel Name">
<input id="hotelLocation" placeholder="Location">
<input id="hotelPrice" placeholder="Price">
<textarea id="hotelDescription" placeholder="Description"></textarea>
<input id="hotelImage" placeholder="Image URL">
<input id="hotelRating" placeholder="Rating (4.8)">
<input id="hotelAmenities" placeholder="Amenities (WiFi, Pool, Parking)">
<select id="hotelFeatured">
<option value="false">Featured: No</option>
<option value="true">Featured: Yes</option>
</select>

<button class="save" onclick="addHotel()">
Add Hotel
</button>

</div>

</div>

<!-- HOMESTAYS -->

<div id="homestays" class="section">

<div class="card">

<h2>Add Homestay</h2>

<input id="homeName" placeholder="Homestay Name">
<input id="homeLocation" placeholder="Location">
<input id="homePrice" placeholder="Price">
<textarea id="homeDescription" placeholder="Description"></textarea>
<input id="homeImage" placeholder="Image URL">
<input id="homeRating" placeholder="Rating">
<input id="homeAmenities" placeholder="Amenities">
<select id="homeFeatured">
<option value="false">Featured: No</option>
<option value="true">Featured: Yes</option>
</select>

<button class="save" onclick="addHomestay()">
Add Homestay
</button>

</div>

</div>

<!-- PACKAGES -->

<div id="packages" class="section">

<div class="card">

<h2>Add Package</h2>

<input id="packageName" placeholder="Package Name">
<input id="packageLocation" placeholder="Destination">
<input id="packagePrice" placeholder="Price">
<textarea id="packageDescription" placeholder="Description"></textarea>
<input id="packageImage" placeholder="Image URL">
<input id="packageDuration" placeholder="Duration (5 Days / 4 Nights)">
<input id="packageHighlights" placeholder="Highlights">
<select id="packageFeatured">
<option value="false">Featured: No</option>
<option value="true">Featured: Yes</option>
</select>

<button class="save" onclick="addPackage()">
Add Package
</button>

</div>

</div>

<!-- LISTINGS MANAGER -->

<div id="manager" class="section">

<div class="card">

<h2>Listings Manager</h2>

<div id="listingContainer">
Loading listings...
</div>

</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="firebase.js"></script>

<script>

function showSection(section){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active");
});

document.getElementById(section).classList.add("active");

}

function addHotel(){

db.ref("hotels").push({

name: hotelName.value,
location: hotelLocation.value,
price: hotelPrice.value,
description: hotelDescription.value,
image: hotelImage.value,
rating: hotelRating.value,
amenities: hotelAmenities.value,
featured: hotelFeatured.value === "true",
createdAt: Date.now()

});

alert("Hotel Added Successfully");

}

function addHomestay(){

db.ref("homestays").push({

name: homeName.value,
location: homeLocation.value,
price: homePrice.value,
description: homeDescription.value,
image: homeImage.value,
rating: homeRating.value,
amenities: homeAmenities.value,
featured: homeFeatured.value === "true",
createdAt: Date.now()

});

alert("Homestay Added Successfully");

}

function addPackage(){

db.ref("packages").push({

name: packageName.value,
location: packageLocation.value,
price: packagePrice.value,
description: packageDescription.value,
image: packageImage.value,
duration: packageDuration.value,
highlights: packageHighlights.value,
featured: packageFeatured.value === "true",
createdAt: Date.now()

});

alert("Package Added Successfully");

}

function deleteListing(type,id){

if(!confirm("Are you sure you want to delete this listing?")){
return;
}

db.ref(type + "/" + id).remove();

}

function loadListings(){

let hotelsCount = 0;
let homestaysCount = 0;
let packagesCount = 0;

function updateTotals(){

hotelCount.innerText = hotelsCount;
homestayCount.innerText = homestaysCount;
packageCount.innerText = packagesCount;
totalCount.innerText =
hotelsCount + homestaysCount + packagesCount;

}

function loadCategory(type,title){

db.ref(type).on("value",(snap)=>{

if(type==="hotels") hotelsCount=snap.numChildren();
if(type==="homestays") homestaysCount=snap.numChildren();
if(type==="packages") packagesCount=snap.numChildren();

updateTotals();

renderManager();

});

}

function renderManager(){

Promise.all([
db.ref("hotels").once("value"),
db.ref("homestays").once("value"),
db.ref("packages").once("value")
]).then(([hotelsSnap,homestaysSnap,packagesSnap])=>{

let html="";

html += "<h3 class='category-title'>HOTELS</h3>";

hotelsSnap.forEach(child=>{

const d=child.val();

html += `
<div class="listing">
<h4>${d.name || ""}</h4>
<p>📍 ${d.location || ""}</p>
<p>💰 ₹${d.price || ""}</p>
<p>⭐ ${d.rating || "N/A"}</p>
<button class="delete-btn"
onclick="deleteListing('hotels','${child.key}')">
Delete
</button>
</div>
`;

});

html += "<h3 class='category-title'>HOMESTAYS</h3>";

homestaysSnap.forEach(child=>{

const d=child.val();

html += `
<div class="listing">
<h4>${d.name || ""}</h4>
<p>📍 ${d.location || ""}</p>
<p>💰 ₹${d.price || ""}</p>
<p>⭐ ${d.rating || "N/A"}</p>
<button class="delete-btn"
onclick="deleteListing('homestays','${child.key}')">
Delete
</button>
</div>
`;

});

html += "<h3 class='category-title'>PACKAGES</h3>";

packagesSnap.forEach(child=>{

const d=child.val();

html += `
<div class="listing">
<h4>${d.name || ""}</h4>
<p>📍 ${d.location || ""}</p>
<p>💰 ₹${d.price || ""}</p>
<p>🗓 ${d.duration || ""}</p>
<button class="delete-btn"
onclick="deleteListing('packages','${child.key}')">
Delete
</button>
</div>
`;

});

listingContainer.innerHTML = html;

});

}

loadCategory("hotels","Hotels");
loadCategory("homestays","Homestays");
loadCategory("packages","Packages");

}

loadListings();

</script>

</body>
</html>
```

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GHUMANTE Admin V2</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.stat-card h3{
margin-bottom:10px;
color:#666;
}

.stat-card p{
font-size:28px;
font-weight:bold;
color:#0f766e;
}

.nav{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.nav button{
padding:12px 18px;
border:none;
background:#0f766e;
color:white;
border-radius:6px;
cursor:pointer;
}

.section{
display:none;
}

.section.active{
display:block;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
}

button.save{
width:100%;
padding:12px;
background:#0f766e;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.manager-filters{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.listing{
border:1px solid #ddd;
padding:15px;
border-radius:8px;
margin-bottom:10px;
}

.edit-btn{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-right:8px;
}

.delete-btn{
background:#dc2626;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.featured-badge{
display:inline-block;
background:gold;
padding:4px 8px;
border-radius:20px;
font-size:12px;
margin-top:8px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:white;
padding:20px;
width:90%;
max-width:650px;
border-radius:10px;
max-height:90vh;
overflow:auto;
}

</style>
</head>

<body>

<header>
<h1>GHUMANTE Admin Dashboard V2</h1>
<p>Travel • Stay • Explore</p>
</header>

<div class="container">

<div class="stats">

<div class="stat-card">
<h3>Hotels</h3>
<p id="hotelCount">0</p>
</div>

<div class="stat-card">
<h3>Homestays</h3>
<p id="homestayCount">0</p>
</div>

<div class="stat-card">
<h3>Packages</h3>
<p id="packageCount">0</p>
</div>

<div class="stat-card">
<h3>Total Listings</h3>
<p id="totalCount">0</p>
</div>

<div class="stat-card">
<h3>Total Leads</h3>
<p id="leadCount">0</p>
</div>

</div>

<div class="nav">

<button onclick="showSection('hotels')">Hotels</button>
<button onclick="showSection('homestays')">Homestays</button>
<button onclick="showSection('packages')">Packages</button>
<button onclick="showSection('manager')">Listings Manager</button>
<button onclick="showSection('leads')">Leads</button>

</div><div id="hotels" class="section active">

<div class="card">

<h2>Add Hotel</h2>

<input id="hotelName" placeholder="Hotel Name">
<input id="hotelLocation" placeholder="Location">
<input id="hotelPrice" placeholder="Price">
<textarea id="hotelDescription" placeholder="Description"></textarea>
<input id="hotelImage" placeholder="Image URL">
<input id="hotelRating" placeholder="Rating">
<input id="hotelAmenities" placeholder="Amenities">

<select id="hotelFeatured">
<option value="false">Featured: No</option>
<option value="true">Featured: Yes</option>
</select>

<button class="save" onclick="addHotel()">Add Hotel</button>

</div>
</div>

<div id="homestays" class="section">

<div class="card">

<h2>Add Homestay</h2>

<input id="homeName" placeholder="Homestay Name">
<input id="homeLocation" placeholder="Location">
<input id="homePrice" placeholder="Price">
<textarea id="homeDescription" placeholder="Description"></textarea>
<input id="homeImage" placeholder="Image URL">
<input id="homeRating" placeholder="Rating">
<input id="homeAmenities" placeholder="Amenities">

<select id="homeFeatured">
<option value="false">Featured: No</option>
<option value="true">Featured: Yes</option>
</select>

<button class="save" onclick="addHomestay()">Add Homestay</button>

</div>
</div>

<div id="packages" class="section">

<div class="card">

<h2>Add Package</h2>

<input id="packageName" placeholder="Package Name">
<input id="packageLocation" placeholder="Destination">
<input id="packagePrice" placeholder="Price">

<textarea id="packageDescription" placeholder="Description"></textarea>

<input id="packageImage" placeholder="Image URL">
<input id="packageDuration" placeholder="Duration">

<textarea id="packageHighlights" placeholder="Highlights"></textarea>

<select id="packageFeatured">
<option value="false">Featured: No</option>
<option value="true">Featured: Yes</option>
</select>

<button class="save" onclick="addPackage()">Add Package</button>

</div>
</div>

<div id="manager" class="section">

<div class="card">

<h2>Listings Manager</h2>

<div class="manager-filters">

<input id="searchInput" placeholder="Search listings..." onkeyup="renderManager()">

<select id="categoryFilter" onchange="renderManager()">
<option value="all">All Categories</option>
<option value="hotels">Hotels</option>
<option value="homestays">Homestays</option>
<option value="packages">Packages</option>
</select>

<select id="featuredFilter" onchange="renderManager()">
<option value="all">All Listings</option>
<option value="featured">Featured Only</option>
</select>

</div>

<div id="listingContainer"></div>

</div>

</div><div id="leads" class="section">

<div class="card">

<h2>Lead Management</h2>

<input
id="leadSearch"
placeholder="Search customer, phone, listing..."
onkeyup="renderLeads()">

<select
id="leadStatusFilter"
onchange="renderLeads()">

<option value="all">All Status</option>
<option value="Pending">Pending</option>
<option value="Contacted">Contacted</option>
<option value="Closed">Closed</option>

</select>

<div id="leadContainer">
Loading Leads...
</div>

</div>

</div>

<div class="modal" id="editModal">

<div class="modal-content">

<h2>Edit Listing</h2>

<input id="editName">
<input id="editLocation">
<input id="editPrice">

<textarea id="editDescription"></textarea>

<input id="editImage">

<input id="editExtra1">

<textarea id="editExtra2"></textarea>

<select id="editFeatured">
<option value="false">Featured: No</option>
<option value="true">Featured: Yes</option>
</select>

<button class="save" onclick="saveEdit()">
Save Changes
</button>

<button class="delete-btn" onclick="closeModal()">
Cancel
</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="firebase.js"></script>

<script>

let currentEditType="";
let currentEditId="";

function showSection(section){

document
.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"));

document
.getElementById(section)
.classList.add("active");

}function updateLeadStatus(id,status){
db.ref("inquiries/"+id).update({
status:status
});
}

function renderLeads(){

db.ref("inquiries").once("value").then((snap)=>{

let html="";
let total=0;

const search=
(document.getElementById("leadSearch")?.value||"")
.toLowerCase();

const filter=
(document.getElementById("leadStatusFilter")?.value||"all");

snap.forEach(child=>{

total++;

const d=child.val();

const text=
`${d.customerName||""}
${d.phone||""}
${d.listingName||""}`
.toLowerCase();

if(search && !text.includes(search)) return;

if(filter!=="all" && d.status!==filter) return;

html+=`
<div class="listing">

<h4>${d.customerName||""}</h4>

<p>📞 ${d.phone||""}</p>
<p>📧 ${d.email||""}</p>
<p>🏨 ${d.listingName||""}</p>
<p>📂 ${d.listingType||""}</p>
<p>📅 ${d.travelDate||""}</p>

<select onchange="updateLeadStatus('${child.key}',this.value)">
<option value="Pending" ${d.status==="Pending"?"selected":""}>Pending</option>
<option value="Contacted" ${d.status==="Contacted"?"selected":""}>Contacted</option>
<option value="Closed" ${d.status==="Closed"?"selected":""}>Closed</option>
</select>

</div>`;
});

leadContainer.innerHTML=
html || "<h3>No Leads Found</h3>";

leadCount.innerText=total;

});
}

renderLeads();

db.ref("inquiries")
.on("value",renderLeads);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GHUMANTE Admin</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#0f766e;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#115e59;
}
</style>
</head>

<body>

<div class="container">

<h1>GHUMANTE Admin Dashboard</h1>

<div class="card">

<h2>Add Hotel</h2>

<input id="hotelName" placeholder="Hotel Name">

<input id="hotelLocation" placeholder="Location">

<input id="hotelPrice" placeholder="Price">

<textarea id="hotelDescription" placeholder="Description"></textarea>

<input id="hotelImage" placeholder="Image URL">

<button onclick="addHotel()">Add Hotel</button>

</div>

<div class="card">

<h2>Add Homestay</h2>

<input id="homeName" placeholder="Homestay Name">

<input id="homeLocation" placeholder="Location">

<input id="homePrice" placeholder="Price">

<textarea id="homeDescription" placeholder="Description"></textarea>

<input id="homeImage" placeholder="Image URL">

<button onclick="addHomestay()">Add Homestay</button>

</div>

<div class="card">

<h2>Add Package</h2>

<input id="packageName" placeholder="Package Name">

<input id="packageLocation" placeholder="Destination">

<input id="packagePrice" placeholder="Price">

<textarea id="packageDescription" placeholder="Package Description"></textarea>

<input id="packageImage" placeholder="Image URL">

<button onclick="addPackage()">Add Package</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="firebase.js"></script>

<script>

function addHotel(){

db.ref("hotels").push({
name: hotelName.value,
location: hotelLocation.value,
price: hotelPrice.value,
description: hotelDescription.value,
image: hotelImage.value,
createdAt: Date.now()
});

alert("Hotel Added");

}

function addHomestay(){

db.ref("homestays").push({
name: homeName.value,
location: homeLocation.value,
price: homePrice.value,
description: homeDescription.value,
image: homeImage.value,
createdAt: Date.now()
});

alert("Homestay Added");

}

function addPackage(){

db.ref("packages").push({
name: packageName.value,
location: packageLocation.value,
price: packagePrice.value,
description: packageDescription.value,
image: packageImage.value,
createdAt: Date.now()
});

alert("Package Added");

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GHUMANTE Admin V2</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.stat-card h3{
margin-bottom:10px;
color:#666;
}

.stat-card p{
font-size:28px;
font-weight:bold;
color:#0f766e;
}

.nav{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.nav button{
padding:12px 18px;
border:none;
background:#0f766e;
color:white;
border-radius:6px;
cursor:pointer;
}

.nav button:hover{
background:#115e59;
}

.section{
display:none;
}

.section.active{
display:block;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h2{
margin-bottom:15px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
}

button.save{
width:100%;
padding:12px;
background:#0f766e;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button.save:hover{
background:#115e59;
}

.manager-filters{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.listing{
border:1px solid #ddd;
padding:15px;
border-radius:8px;
margin-bottom:10px;
}

.edit-btn{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-right:8px;
}

.delete-btn{
background:#dc2626;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.featured-badge{
display:inline-block;
background:gold;
padding:4px 8px;
border-radius:20px;
margin-top:8px;
font-size:12px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:white;
padding:20px;
width:90%;
max-width:650px;
border-radius:10px;
max-height:90vh;
overflow:auto;
}

@media(max-width:768px){

.manager-filters{
grid-template-columns:1fr;
}

.nav{
flex-direction:column;
}

}

</style>
</head>

<body>

<header>
<h1>GHUMANTE Admin Dashboard V2</h1>
<p>Travel • Stay • Explore</p>
</header>

<div class="container">

<div class="stats">

<div class="stat-card">
<h3>Hotels</h3>
<p id="hotelCount">0</p>
</div>

<div class="stat-card">
<h3>Homestays</h3>
<p id="homestayCount">0</p>
</div>

<div class="stat-card">
<h3>Packages</h3>
<p id="packageCount">0</p>
</div>

<div class="stat-card">
<h3>Total Listings</h3>
<p id="totalCount">0</p>
</div>

</div>

<div class="nav">

<button onclick="showSection('hotels')">
Hotels
</button>

<button onclick="showSection('homestays')">
Homestays
</button>

<button onclick="showSection('packages')">
Packages
</button>

<button onclick="showSection('manager')">
Listings Manager
</button>

</div>
<!-- HOTELS -->

<div id="hotels" class="section active">

<div class="card">

<h2>Add Hotel</h2>

<input id="hotelName" placeholder="Hotel Name">
<input id="hotelLocation" placeholder="Location">
<input id="hotelPrice" placeholder="Price">

<textarea id="hotelDescription"
placeholder="Description"></textarea>

<input id="hotelImage"
placeholder="Image URL">

<input id="hotelRating"
placeholder="Rating (4.8)">

<input id="hotelAmenities"
placeholder="Amenities (WiFi, Pool, Parking)">

<select id="hotelFeatured">
<option value="false">Featured: No</option>
<option value="true">Featured: Yes</option>
</select>

<button class="save" onclick="addHotel()">
Add Hotel
</button>

</div>

</div>

<!-- HOMESTAYS -->

<div id="homestays" class="section">

<div class="card">

<h2>Add Homestay</h2>

<input id="homeName" placeholder="Homestay Name">
<input id="homeLocation" placeholder="Location">
<input id="homePrice" placeholder="Price">

<textarea id="homeDescription"
placeholder="Description"></textarea>

<input id="homeImage"
placeholder="Image URL">

<input id="homeRating"
placeholder="Rating">

<input id="homeAmenities"
placeholder="Amenities">

<select id="homeFeatured">
<option value="false">Featured: No</option>
<option value="true">Featured: Yes</option>
</select>

<button class="save" onclick="addHomestay()">
Add Homestay
</button>

</div>

</div>

<!-- PACKAGES -->

<div id="packages" class="section">

<div class="card">

<h2>Add Package</h2>

<input id="packageName" placeholder="Package Name">
<input id="packageLocation" placeholder="Destination">
<input id="packagePrice" placeholder="Price">

<textarea id="packageDescription"
placeholder="Description"></textarea>

<input id="packageImage"
placeholder="Image URL">

<input id="packageDuration"
placeholder="Duration (5 Days / 4 Nights)">

<textarea
id="packageHighlights"
placeholder="Highlights (one per line)">
</textarea>

<select id="packageFeatured">
<option value="false">Featured: No</option>
<option value="true">Featured: Yes</option>
</select>

<button class="save" onclick="addPackage()">
Add Package
</button>

</div>

</div>

<!-- LISTINGS MANAGER -->

<div id="manager" class="section">

<div class="card">

<h2>Listings Manager</h2>

<div class="manager-filters">

<input
id="searchInput"
placeholder="Search listings..."
onkeyup="renderManager()">

<select
id="categoryFilter"
onchange="renderManager()">

<option value="all">All Categories</option>
<option value="hotels">Hotels</option>
<option value="homestays">Homestays</option>
<option value="packages">Packages</option>

</select>

<select
id="featuredFilter"
onchange="renderManager()">

<option value="all">All Listings</option>
<option value="featured">Featured Only</option>

</select>

</div>

<div id="listingContainer">
Loading...
</div>

</div>

</div>

<!-- EDIT MODAL -->

<div class="modal" id="editModal">

<div class="modal-content">

<h2>Edit Listing</h2>

<input id="editName" placeholder="Name">

<input id="editLocation"
placeholder="Location">

<input id="editPrice"
placeholder="Price">

<textarea id="editDescription"
placeholder="Description"></textarea>

<input id="editImage"
placeholder="Image URL">

<input id="editExtra1">

<textarea id="editExtra2"></textarea>

<select id="editFeatured">

<option value="false">
Featured: No
</option>

<option value="true">
Featured: Yes
</option>

</select>

<button class="save"
onclick="saveEdit()">
Save Changes
</button>

<button class="delete-btn"
onclick="closeModal()">
Cancel
</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="firebase.js"></script>

<script>

let currentEditType="";
let currentEditId="";

function showSection(section){

document
.querySelectorAll(".section")
.forEach(s=>{
s.classList.remove("active");
});

document
.getElementById(section)
.classList.add("active");

}function addHotel(){

db.ref("hotels").push({

name: hotelName.value,
location: hotelLocation.value,
price: hotelPrice.value,
description: hotelDescription.value,
image: hotelImage.value,
rating: hotelRating.value,
amenities: hotelAmenities.value,
featured: hotelFeatured.value==="true",
createdAt: Date.now()

});

alert("Hotel Added");

}

function addHomestay(){

db.ref("homestays").push({

name: homeName.value,
location: homeLocation.value,
price: homePrice.value,
description: homeDescription.value,
image: homeImage.value,
rating: homeRating.value,
amenities: homeAmenities.value,
featured: homeFeatured.value==="true",
createdAt: Date.now()

});

alert("Homestay Added");

}

function addPackage(){

db.ref("packages").push({

name: packageName.value,
location: packageLocation.value,
price: packagePrice.value,
description: packageDescription.value,
image: packageImage.value,
duration: packageDuration.value,
highlights: packageHighlights.value,
featured: packageFeatured.value==="true",
createdAt: Date.now()

});

alert("Package Added");

}

function deleteListing(type,id){

if(!confirm("Delete this listing?")){
return;
}

db.ref(type+"/"+id).remove();

}

function openEdit(type,id,data){

currentEditType=type;
currentEditId=id;

editName.value=data.name || "";
editLocation.value=data.location || "";
editPrice.value=data.price || "";
editDescription.value=data.description || "";
editImage.value=data.image || "";

editFeatured.value=
data.featured ? "true":"false";

if(type==="packages"){

editExtra1.placeholder="Duration";
editExtra2.placeholder="Highlights";

editExtra1.value=data.duration || "";
editExtra2.value=data.highlights || "";

}else{

editExtra1.placeholder="Rating";
editExtra2.placeholder="Amenities";

editExtra1.value=data.rating || "";
editExtra2.value=data.amenities || "";

}

editModal.style.display="flex";

}

function closeModal(){

editModal.style.display="none";

}

function saveEdit(){

let updateData={

name: editName.value,
location: editLocation.value,
price: editPrice.value,
description: editDescription.value,
image: editImage.value,
featured: editFeatured.value==="true"

};

if(currentEditType==="packages"){

updateData.duration=editExtra1.value;
updateData.highlights=editExtra2.value;

}else{

updateData.rating=editExtra1.value;
updateData.amenities=editExtra2.value;

}

db.ref(
currentEditType+"/"+currentEditId
).update(updateData);

alert("Updated Successfully");

closeModal();

}

function renderManager(){

Promise.all([

db.ref("hotels").once("value"),
db.ref("homestays").once("value"),
db.ref("packages").once("value")

]).then(([hotelsSnap,homesSnap,packagesSnap])=>{

let html="";

const search=
(searchInput?.value || "")
.toLowerCase();

const category=
categoryFilter?.value || "all";

const featured=
featuredFilter?.value || "all";

function allowed(type,d){

const text=
`${d.name||""} ${d.location||""}`
.toLowerCase();

if(search && !text.includes(search)){
return false;
}

if(category!=="all" &&
category!==type){
return false;
}

if(
featured==="featured" &&
!d.featured
){
return false;
}

return true;

}

let hotelsCount=0;
let homesCount=0;
let packagesCount=0;

html+="<h3>HOTELS</h3>";

hotelsSnap.forEach(child=>{

hotelsCount++;

const d=child.val();

if(!allowed("hotels",d)) return;

html+=`

<div class="listing">

<h4>${d.name||""}</h4>

<p>📍 ${d.location||""}</p>

<p>💰 ₹${d.price||""}</p>

<p>⭐ ${d.rating||"N/A"}</p>

${
d.featured
? '<div class="featured-badge">Featured</div>'
: ''
}

<br><br>

<button
class="edit-btn"
onclick='openEdit(
"hotels",
"${child.key}",
${JSON.stringify(d)}
)'>
Edit
</button>

<button
class="delete-btn"
onclick="deleteListing(
'hotels',
'${child.key}'
)">
Delete
</button>

</div>

`;

});

html+="<h3>HOMESTAYS</h3>";

homesSnap.forEach(child=>{

homesCount++;

const d=child.val();

if(!allowed("homestays",d)) return;

html+=`

<div class="listing">

<h4>${d.name||""}</h4>

<p>📍 ${d.location||""}</p>

<p>💰 ₹${d.price||""}</p>

<p>⭐ ${d.rating||"N/A"}</p>

${
d.featured
? '<div class="featured-badge">Featured</div>'
: ''
}

<br><br>

<button
class="edit-btn"
onclick='openEdit(
"homestays",
"${child.key}",
${JSON.stringify(d)}
)'>
Edit
</button>

<button
class="delete-btn"
onclick="deleteListing(
'homestays',
'${child.key}'
)">
Delete
</button>

</div>

`;

});

html+="<h3>PACKAGES</h3>";

packagesSnap.forEach(child=>{

packagesCount++;

const d=child.val();

if(!allowed("packages",d)) return;

html+=`

<div class="listing">

<h4>${d.name||""}</h4>

<p>📍 ${d.location||""}</p>

<p>💰 ₹${d.price||""}</p>

<p>🗓 ${d.duration||""}</p>

${
d.featured
? '<div class="featured-badge">Featured</div>'
: ''
}

<br><br>

<button
class="edit-btn"
onclick='openEdit(
"packages",
"${child.key}",
${JSON.stringify(d)}
)'>
Edit
</button>

<button
class="delete-btn"
onclick="deleteListing(
'packages',
'${child.key}'
)">
Delete
</button>

</div>

`;

});

listingContainer.innerHTML=html;

hotelCount.innerText=hotelsCount;
homestayCount.innerText=homesCount;
packageCount.innerText=packagesCount;

totalCount.innerText=
hotelsCount+
homesCount+
packagesCount;

});

}

db.ref("hotels").on("value",renderManager);
db.ref("homestays").on("value",renderManager);
db.ref("packages").on("value",renderManager);

renderManager();

</script>

</body>
</html>

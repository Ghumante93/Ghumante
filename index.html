<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GHUMANTE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#0f172a;
color:white;
padding:25px;
text-align:center;
}

header p{
margin-top:8px;
}

.section-title{
margin:25px 20px 10px;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

.card{
background:white;
width:320px;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.12);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.content{
padding:15px;
}

.title{
font-size:20px;
font-weight:bold;
margin-bottom:8px;
}

.price{
color:green;
font-weight:bold;
margin:10px 0;
font-size:18px;
}

.desc{
margin-top:10px;
color:#555;
line-height:1.5;
}

.rating{
margin-top:10px;
font-weight:bold;
color:#f59e0b;
}

.amenity,
.highlight{
margin-top:5px;
font-size:14px;
}

.duration{
margin-top:10px;
font-weight:bold;
}

@media(max-width:768px){

.container{
justify-content:center;
}

.card{
width:95%;
}

}

</style>
</head>

<body>

<header>
<h1>GHUMANTE</h1>
<p>Travel. Stay. Explore.</p>
</header>

<h2 class="section-title">Hotels</h2>
<div id="hotels" class="container"></div>

<h2 class="section-title">Homestays</h2>
<div id="homestays" class="container"></div>

<h2 class="section-title">Packages</h2>
<div id="packages" class="container"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="firebase.js"></script>

<script>

function renderAmenities(text){

if(!text) return "";

return text.split(",")
.map(item => `<div class="amenity">🏨 ${item.trim()}</div>`)
.join("");

}

function renderHighlights(text){

if(!text) return "";

return text.split(",")
.map(item => `<div class="highlight">✨ ${item.trim()}</div>`)
.join("");

}

function hotelCard(d){

return `

<div class="card">

<img src="${d.image || 'https://picsum.photos/500/300'}">

<div class="content">

<div class="title">
${d.name || ''}
</div>

<div>
📍 ${d.location || ''}
</div>

<div class="price">
₹ ${d.price || 'N/A'}
</div>

<div class="rating">
⭐ ${d.rating || 'N/A'}
</div>

${renderAmenities(d.amenities)}

<div class="desc">
${d.description || ''}
</div>

</div>

</div>

`;

}

function packageCard(d){

return `

<div class="card">

<img src="${d.image || 'https://picsum.photos/500/300'}">

<div class="content">

<div class="title">
${d.name || ''}
</div>

<div>
📍 ${d.location || ''}
</div>

<div class="price">
₹ ${d.price || 'N/A'}
</div>

<div class="duration">
🗓 ${d.duration || ''}
</div>

${renderHighlights(d.highlights)}

<div class="desc">
${d.description || ''}
</div>

</div>

</div>

`;

}

function loadData(){

db.ref("hotels").on("value",(snap)=>{

hotels.innerHTML="";

snap.forEach(child=>{

hotels.innerHTML += hotelCard(child.val());

});

});

db.ref("homestays").on("value",(snap)=>{

homestays.innerHTML="";

snap.forEach(child=>{

homestays.innerHTML += hotelCard(child.val());

});

});

db.ref("packages").on("value",(snap)=>{

packages.innerHTML="";

snap.forEach(child=>{

packages.innerHTML += packageCard(child.val());

});

});

}

loadData();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GHUMANTE</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 20px;
      text-align: center;
    }

    h2 {
      margin-left: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      padding: 10px;
    }

    .card {
      background: white;
      margin: 10px;
      width: 250px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 5px #ccc;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card .content {
      padding: 10px;
    }

    .title {
      font-weight: bold;
    }

    .price {
      color: green;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>GHUMANTE</h1>
  <p>Explore Nepal Easily</p>
</header>

<h2>Hotels</h2>
<div id="hotels" class="container"></div>

<h2>Homestays</h2>
<div id="homestays" class="container"></div>

<h2>Packages</h2>
<div id="packages" class="container"></div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<!-- Firebase Config -->
<script src="firebase.js"></script>

<script>
function loadData() {

  // HOTELS
  db.ref("hotels").on("value", (snap) => {
    hotels.innerHTML = "";
    snap.forEach(child => {
      let d = child.val();
      hotels.innerHTML += `
        <div class="card">
          <img src="${d.image}">
          <div class="content">
            <div class="title">${d.name}</div>
            <div>${d.location}</div>
          </div>
        </div>
      `;
    });
  });

  // HOMESTAYS
  db.ref("homestays").on("value", (snap) => {
    homestays.innerHTML = "";
    snap.forEach(child => {
      let d = child.val();
      homestays.innerHTML += `
        <div class="card">
          <img src="${d.image}">
          <div class="content">
            <div class="title">${d.name}</div>
            <div>${d.location}</div>
          </div>
        </div>
      `;
    });
  });

  // PACKAGES
  db.ref("packages").on("value", (snap) => {
    packages.innerHTML = "";
    snap.forEach(child => {
      let d = child.val();
      packages.innerHTML += `
        <div class="card">
          <img src="${d.image}">
          <div class="content">
            <div class="title">${d.name}</div>
            <div class="price">Rs ${d.price}</div>
          </div>
        </div>
      `;
    });
  });

}

loadData();
</script>

</body>
</html>

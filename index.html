<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GHUMANTE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#0f172a;
color:white;
padding:25px;
text-align:center;
}

header p{
margin-top:8px;
}

.filters{
background:white;
padding:20px;
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.filters input,
.filters select{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
min-width:250px;
}

.section-title{
margin:20px;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:20px;
justify-content:center;
}

.card{
background:white;
width:320px;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.12);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.content{
padding:15px;
}

.title{
font-size:20px;
font-weight:bold;
margin-bottom:8px;
}

.price{
color:green;
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.rating{
margin-top:8px;
color:#f59e0b;
font-weight:bold;
}

.desc{
margin-top:10px;
color:#555;
line-height:1.5;
}

.amenity,
.highlight{
margin-top:5px;
font-size:14px;
}

.duration{
margin-top:10px;
font-weight:bold;
}

.view-btn{
display:block;
margin-top:15px;
padding:12px;
text-align:center;
background:#0f766e;
color:white;
text-decoration:none;
border-radius:8px;
}

.view-btn:hover{
background:#115e59;
}

.inquiry-btn{
width:100%;
margin-top:10px;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.inquiry-btn:hover{
background:#1d4ed8;
}

.badge{
display:inline-block;
background:#e2e8f0;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-bottom:10px;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
z-index:9999;
}

.modal-content{
background:white;
width:90%;
max-width:500px;
margin:50px auto;
padding:20px;
border-radius:10px;
}

.modal-content input,
.modal-content textarea{
width:100%;
padding:10px;
margin-top:10px;
}

.close-btn{
float:right;
font-size:25px;
cursor:pointer;
}

@media(max-width:768px){

.filters{
flex-direction:column;
}

.filters input,
.filters select{
width:100%;
}

.card{
width:95%;
}

}

</style>
</head>

<body>

<header>
<h1>GHUMANTE</h1>
<p>Travel. Stay. Explore.</p>
</header>

<div class="filters">

<input
type="text"
id="searchInput"
placeholder="Search destination, hotel, package..."
>

<select id="categoryFilter">

<option value="all">All Categories</option>

<option value="hotels">Hotels</option>

<option value="homestays">Homestays</option>

<option value="packages">Packages</option>

</select>

</div>

<h2 class="section-title">Results</h2>

<div id="results" class="container"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="firebase.js"></script>

<script>

let allListings = [];
let inquiryListingId = "";
let inquiryListingName = "";
let inquiryListingType = "";

function renderAmenities(text){

if(!text) return "";

return text.split(",")
.map(item => `<div class="amenity">🏨 ${item.trim()}</div>`)
.join("");

}

function renderHighlights(text){

if(!text) return "";

return text.split(",")
.map(item => `<div class="highlight">✨ ${item.trim()}</div>`)
.join("");

}function createCard(item){

let extra = "";

if(item.type === "packages"){

extra += `
<div class="duration">
🗓 ${item.duration || ""}
</div>

${renderHighlights(item.highlights)}
`;

}else{

extra += `
<div class="rating">
⭐ ${item.rating || "N/A"}
</div>

${renderAmenities(item.amenities)}
`;

}

return `

<div class="card">

<img src="${item.image || 'https://picsum.photos/500/300'}">

<div class="content">

<div class="badge">
${item.type.toUpperCase()}
</div>

<div class="title">
${item.name || ""}
</div>

<div>
📍 ${item.location || ""}
</div>

<div class="price">
₹ ${item.price || "N/A"}
</div>

${extra}

<div class="desc">
${item.description || ""}
</div>

<a
class="view-btn"
href="details.html?id=${item.id}&type=${item.type}"
>
View Details
</a>

<button
class="inquiry-btn"
onclick="openInquiryModal(
'${item.id}',
'${item.name}',
'${item.type}'
)"
>
Send Inquiry
</button>

</div>

</div>

`;

}

function renderListings(){

const search =
document.getElementById("searchInput")
.value
.toLowerCase();

const category =
document.getElementById("categoryFilter")
.value;

let filtered = allListings.filter(item=>{

const matchSearch =

(item.name || "")
.toLowerCase()
.includes(search)

||

(item.location || "")
.toLowerCase()
.includes(search);

const matchCategory =

category === "all"

||

item.type === category;

return matchSearch && matchCategory;

});

results.innerHTML = "";

if(filtered.length===0){

results.innerHTML =
"<h3>No listings found</h3>";

return;

}

filtered.forEach(item=>{

results.innerHTML += createCard(item);

});

}function openInquiryModal(id,name,type){

inquiryListingId=id;
inquiryListingName=name;
inquiryListingType=type;

document.getElementById("inquiryModal")
.style.display="block";

}

function closeInquiryModal(){

document.getElementById("inquiryModal")
.style.display="none";

}

function submitInquiry(){

const inquiry={

listingId: inquiryListingId,
listingName: inquiryListingName,
listingType: inquiryListingType,

customerName:
document.getElementById("inqName").value,

phone:
document.getElementById("inqPhone").value,

email:
document.getElementById("inqEmail").value,

travelDate:
document.getElementById("inqTravelDate").value,

guests:
document.getElementById("inqGuests").value,

message:
document.getElementById("inqMessage").value,

status:"Pending",

createdAt: Date.now()

};

db.ref("inquiries")
.push(inquiry)
.then(()=>{

alert("Inquiry Submitted Successfully");

closeInquiryModal();

document.getElementById("inqName").value="";
document.getElementById("inqPhone").value="";
document.getElementById("inqEmail").value="";
document.getElementById("inqTravelDate").value="";
document.getElementById("inqGuests").value="";
document.getElementById("inqMessage").value="";

});

}

function loadCategory(path){

db.ref(path).on("value",(snap)=>{

allListings =
allListings.filter(x=>x.type!==path);

snap.forEach(child=>{

allListings.push({

id: child.key,
type: path,
...child.val()

});

});

renderListings();

});

}

loadCategory("hotels");
loadCategory("homestays");
loadCategory("packages");

document
.getElementById("searchInput")
.addEventListener("input",renderListings);

document
.getElementById("categoryFilter")
.addEventListener("change",renderListings);

</script>

<div id="inquiryModal" class="modal">

<div class="modal-content">

<span class="close-btn"
onclick="closeInquiryModal()">
×
</span>

<h2>Send Inquiry</h2>

<input type="text" id="inqName" placeholder="Your Name">
<input type="tel" id="inqPhone" placeholder="Phone Number">
<input type="email" id="inqEmail" placeholder="Email Address">
<input type="date" id="inqTravelDate">
<input type="number" id="inqGuests" placeholder="Number of Guests">

<textarea
id="inqMessage"
placeholder="Tell us your travel requirements">
</textarea>

<button
class="inquiry-btn"
onclick="submitInquiry()">
Submit Inquiry
</button>

</div>

</div>

</body>
</html>

<body>

<header>
<h1>GHUMANTE</h1>
<p>Explore Nepal Easily</p>
</header>

<h2>Hotels</h2>
<div id="hotels" class="container"></div>

<h2>Homestays</h2>
<div id="homestays" class="container"></div>

<h2>Packages</h2>
<div id="packages" class="container"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="firebase.js"></script>

<script>

function hotelCard(d){

return `
<div class="card">

<img src="${d.image || 'https://picsum.photos/400/300'}">

<div class="content">

<div class="title">
${d.name || ''}
</div>

<div>
📍 ${d.location || ''}
</div>

<div class="price">
₹ ${d.price || 'N/A'}
</div>

<div class="desc">
${d.description || ''}
</div>

</div>

</div>
`;

}

function loadData(){

db.ref("hotels").on("value",(snap)=>{

hotels.innerHTML="";

snap.forEach(child=>{

hotels.innerHTML += hotelCard(child.val());

});

});

db.ref("homestays").on("value",(snap)=>{

homestays.innerHTML="";

snap.forEach(child=>{

homestays.innerHTML += hotelCard(child.val());

});

});

db.ref("packages").on("value",(snap)=>{

packages.innerHTML="";

snap.forEach(child=>{

packages.innerHTML += hotelCard(child.val());

});

});

}

loadData();

</script>
